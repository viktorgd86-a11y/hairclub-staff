/* Карточка с акцентным цветом */
function mCard(accent, label, value, icon) {
    var bg = '';
    if (accent === 'accent-green')  bg = 'background:#e8f5e9;';
    if (accent === 'accent-purple') bg = 'background:#f3e5f5;';
    if (accent === 'accent-blue')   bg = 'background:#e3f2fd;';
    return '<div class="metrics-card" style="' + bg + '">' +
        '<div class="metrics-card-label">' + (icon ? icon + ' ' : '') + label + '</div>' +
        '<div class="metrics-card-value">' + value + '</div>' +
        '</div>';
}

/* KPI-карточка с иконкой статуса и цветом значения */
function mKpiCard(label, value, icon, color, suffix) {
    var valColor = color==='green'?'#2e7d32':color==='orange'?'#e65100':'#c62828';
    var bg = color==='green'?'background:#e8f5e9;':color==='orange'?'background:#fff3e0;':'background:#ffebee;';
    return '<div class="metrics-card" style="' + bg + '">' +
        '<div class="metrics-card-label">' + label + '</div>' +
        '<div style="display:flex;align-items:center;gap:6px;">' +
        '<span class="metrics-card-value" style="color:' + valColor + ';">' + value + suffix + '</span>' +
        '<span style="font-size:16px;">' + icon + '</span>' +
        '</div></div>';
}

function metricsCard(colorClass, label, value) {
    return '<div class="metrics-card ' + colorClass + '">' +
        '<div class="metrics-card-label">' + label + '</div>' +
        '<div class="metrics-card-value">' + value + '</div>' +
        '</div>';
}

function buildManagerChart(sections) {
    if (!sections || sections.length === 0) return '';
    var hasData = sections.some(function(s) { return s.new||s.old||s.total; });
    if (!hasData) return '';

    var W = 300, H = 150, padL = 12, padR = 12, padT = 24, padB = 36;
    var chartH = H - padT - padB;
    var maxVal = 0;
    sections.forEach(function(s) { maxVal = Math.max(maxVal, s.new, s.old, s.total); });
    if (maxVal === 0) return '';

    var barW = 20, gap = 5, groupGap = 28;
    var colors = ['#42a5f5','#66bb6a','#ab47bc'];
    var keys = ['new','old','total'];
    var keyLabels = ['Новые','Старые','Общие'];

    var bars = '', xLabels = '';
    sections.forEach(function(s, gi) {
        var groupX = padL + gi * (3*barW + 2*gap + groupGap);
        keys.forEach(function(k, bi) {
            var val = s[k];
            var barH = (val / maxVal) * chartH;
            var x = groupX + bi * (barW + gap);
            var y = padT + chartH - barH;
            bars += '<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+barH+'" fill="'+colors[bi]+'" rx="3"/>';
            if (val > 0) bars += '<text x="'+(x+barW/2)+'" y="'+(y-3)+'" text-anchor="middle" font-size="9" fill="#555">'+val+'</text>';
        });
        var cx = groupX + (3*barW + 2*gap) / 2;
        xLabels += '<text x="'+cx+'" y="'+(H-20)+'" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">'+s.name+'</text>';
        xLabels += '<text x="'+cx+'" y="'+(H-7)+'" text-anchor="middle" font-size="10" fill="#7b1fa2">'+s.conv+'% конв.</text>';
    });

    var legend = keyLabels.map(function(l, i) {
        return '<rect x="'+(padL+i*75)+'" y="5" width="9" height="9" fill="'+colors[i]+'" rx="2"/>' +
               '<text x="'+(padL+i*75+12)+'" y="13" font-size="9" fill="#555">'+l+'</text>';
    }).join('');

    return '<div class="chart-wrap" style="margin-top:14px;">' +
        '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">' +
        legend + bars + xLabels + '</svg></div>';
}

function buildMetricsChart(data) {
    // Фильтруем — только дни где есть хоть какое-то значение
    var days = data.filter(function(d) {
        return (parseFloat(d.extra_sales)||0) > 0 || (parseFloat(d.cosmetics)||0) > 0;
    });
    if (days.length === 0) return '';

    var barW = 12, gap = 4, groupGap = 10;
    var groupW = 2 * barW + gap;
    var padL = 10, padR = 16, padT = 28, padB = 22;
    var W = Math.max(260, padL + padR + days.length * (groupW + groupGap));
    var H = 140;
    var chartH = H - padT - padB;

    var maxVal = 0;
    days.forEach(function(d) {
        maxVal = Math.max(maxVal, parseFloat(d.extra_sales)||0, parseFloat(d.cosmetics)||0);
    });
    if (maxVal === 0) return '';

    var bars = '', labels = '', tooltips = '';

    days.forEach(function(d, i) {
        var sales = parseFloat(d.extra_sales) || 0;
        var cosm  = parseFloat(d.cosmetics)   || 0;
        var dayNum = parseInt(d.date.split('-')[2], 10);
        var gx = padL + i * (groupW + groupGap);
        var cx = gx + groupW / 2;

        // Столбик продаж
        var salesH = (sales / maxVal) * chartH;
        var salesY = padT + chartH - salesH;
        bars += '<rect x="'+gx+'" y="'+salesY+'" width="'+barW+'" height="'+salesH+'" fill="#43a047" rx="3" opacity="0.85"/>';
        if (sales > 0) bars += '<text x="'+(gx+barW/2)+'" y="'+(salesY-3)+'" text-anchor="middle" font-size="8" fill="#2e7d32">'+formatNumber(sales)+'</text>';

        // Столбик косметики
        var cosmH = (cosm / maxVal) * chartH;
        var cosmY = padT + chartH - cosmH;
        bars += '<rect x="'+(gx+barW+gap)+'" y="'+cosmY+'" width="'+barW+'" height="'+cosmH+'" fill="#ab47bc" rx="3" opacity="0.85"/>';
        if (cosm > 0) bars += '<text x="'+(gx+barW+gap+barW/2)+'" y="'+(cosmY-3)+'" text-anchor="middle" font-size="8" fill="#6a1b9a">'+formatNumber(cosm)+'</text>';

        // Подпись дня
        labels += '<text x="'+cx+'" y="'+(H-6)+'" text-anchor="middle" font-size="10" font-weight="bold" fill="#555">'+dayNum+'</text>';
    });

    // Легенда
    var legend =
        '<rect x="'+padL+'" y="6" width="9" height="9" fill="#43a047" rx="2"/>' +
        '<text x="'+(padL+12)+'" y="14" font-size="9" fill="#555">Доп. продажи</text>' +
        '<rect x="'+(padL+90)+'" y="6" width="9" height="9" fill="#ab47bc" rx="2"/>' +
        '<text x="'+(padL+102)+'" y="14" font-size="9" fill="#555">Косметика</text>';

    // Горизонтальная линия основания
    var baseline = '<line x1="'+padL+'" y1="'+(padT+chartH)+'" x2="'+(W-padR)+'" y2="'+(padT+chartH)+'" stroke="#eee" stroke-width="1"/>';

    return '<div class="chart-wrap" style="margin-top:10px;">' +
        '<svg class="chart-svg" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">' +
        baseline + bars + labels + legend +
        '</svg></div>';
}

function calcNumerologyNumber(birthdate) {
    // Личное число дня = цифровой корень (дата рождения + сегодняшняя дата)
    var today = new Date();
    var dd = today.getDate();
    var mm = today.getMonth() + 1;
    var yyyy = today.getFullYear();

    // Парсим дату рождения (форматы: ДД.ММ.ГГГГ или Date-строка)
    var bday = 0, bmonth = 0;
    if (birthdate) {
        var parts = birthdate.replace(/\//g, '.').split('.');
        if (parts.length >= 2) {
            bday = parseInt(parts[0], 10) || 0;
            bmonth = parseInt(parts[1], 10) || 0;
        }
    }

    // Складываем все цифры: день рождения + месяц рождения + день + месяц + год
    var sum = 0;
    function addDigits(n) {
        String(n).split('').forEach(function(c) { sum += parseInt(c, 10) || 0; });
    }
    addDigits(bday);
    addDigits(bmonth);
    addDigits(dd);
    addDigits(mm);
    addDigits(yyyy);

    // Сводим к числу от 1 до 9
    while (sum > 9) {
        var s = 0;
        String(sum).split('').forEach(function(c) { s += parseInt(c, 10) || 0; });
        sum = s;
    }
    return sum || 1;
}

            messages: [{
                role: 'user',
                content: 'Ты нумеролог. Сегодня ' + todayStr + '. Персональное число дня сотрудника beauty-салона: ' + num + '. Напиши короткий (2-3 предложения) вдохновляющий прогноз на сегодня, с акцентом на работу с клиентами и мастерство. Тёплый, женский стиль. Только текст прогноза, без заголовков и вступлений.'
            }]
        })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        var text = (data.content && data.content[0] && data.content[0].text) || 'Сегодня особенный день — доверяй своей интуиции и всё получится! ✨';
        try { sessionStorage.setItem(dateKey, text); } catch(e) {}
        showNumerologyBlock(div, num, text);
    })
    .catch(function() {
        var fallback = 'Сегодня твоё число ' + num + ' — это день силы и вдохновения. Дари клиентам красоту и хорошее настроение! ✨';
        showNumerologyBlock(div, num, fallback);
    });
}

function showNumerologyBlock(div, num, text) {
    var today = new Date();
    var monthNames = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    var todayStr = today.getDate() + ' ' + monthNames[today.getMonth()];
    div.innerHTML =
        '<div class="numerology-block">' +
        '<div class="numerology-title">Твоё число на ' + todayStr + '</div>' +
        '<div class="numerology-number">' + num + '</div>' +
        '<div class="numerology-text">' + text + '</div>' +
        '</div>';
}

/* ============================================================
   ДИНАМИЧЕСКОЕ ИСПРАВЛЕНИЕ STICKY ЗАГОЛОВКОВ
   ============================================================ */
function fixStickyHeaders() {
    requestAnimationFrame(function() {
        requestAnimationFrame(function() {
            var tables = [
                { tableClass: 'main-table', container: 'mainTableContainer' },
                { tableClass: 'manager-table', container: 'managerTableContainer' }
            ];
            tables.forEach(function(t) {
                var container = document.getElementById(t.container);
                if (!container) return;
                var table = container.querySelector('.' + t.tableClass);
                if (!table) return;
                var rows = table.querySelectorAll('thead tr');
                var offset = 0;
                rows.forEach(function(row) {
                    var cells = row.querySelectorAll('th, td');
                    var rowH = row.getBoundingClientRect().height;
                    cells.forEach(function(cell) {
                        cell.style.position = 'sticky';
                        cell.style.top = offset + 'px';
                    });
                    offset += rowH;
                });
            });
        });
    });
}
